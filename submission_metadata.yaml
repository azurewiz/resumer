# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude was used throughout development as an architecture reviewer and
  pair-programmer. This included: designing the 6-component scoring rubric,
  generating initial implementations of each scorer, and debugging issues
  (e.g., diagnosing why the honeypot filter initially flagged zero candidates
  by testing signal overlap against the full 100K dataset, leading to the
  AND → OR rule change). Every script was run, tested, and independently
  sanity-checked against real data by the author before moving forward.
  No candidate data was sent to any external LLM API at any point. The
  entire ranking pipeline runs fully offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage pipeline: (1) a honeypot filter that excludes profiles with
  impossible internal facts (expert skill at zero months, or career duration
  inconsistent with stated experience); (2) a 6-component weighted Fit Score
  — career-context semantic fit via sentence-transformers (35%), skill-depth
  weighted by proficiency and duration_months (25%), experience-range bell
  curve (15%), tenure-stability pattern check (10%), geo-eligibility (8%),
  and quality tiebreakers (7%) — multiplied by a behavioral-availability
  modifier that down-weights unreachable candidates (inactive, unresponsive,
  not open to work). Career-context uses all-MiniLM-L6-v2 embeddings to
  capture semantic meaning, not keyword overlap — specifically to handle
  plain-language Tier-5 fits and resist keyword stuffers. Runtime for the
  ranking step: ~17 seconds on CPU for 100K candidates.

